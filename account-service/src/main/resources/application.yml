server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: account-service
  datasource:
    url: jdbc:h2:mem:accountdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  h2:
    console:
      enabled: false

account:
  recent-transaction-limit: ${RECENT_TRANSACTION_LIMIT:10}

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    root: INFO
